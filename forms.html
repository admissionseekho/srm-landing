<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forms - For Netlify Detection Only</title>
  <!-- This page is for Netlify form detection only. Users won't see this. -->
</head>
<body style="display:none;">
  
  <!-- FORM 1: Hero Form -->
  <form name="lead-form-hero" method="POST" data-netlify="true" netlify-honeypot="bot-field">
    <input type="hidden" name="form-name" value="lead-form-hero" />
    <p style="display:none"><label>Don't fill: <input name="bot-field" /></label></p>
    
    <input type="text" name="name" />
    <input type="tel" name="phone" />
    <input type="text" name="city" />
    <select name="branch">
      <option>B.Tech – CSE</option>
    </select>
    <select name="campus">
      <option>SRM Kattankulathur</option>
    </select>
    <input type="hidden" name="utm_source" />
    <input type="hidden" name="utm_medium" />
    <input type="hidden" name="utm_campaign" />
    <input type="hidden" name="utm_term" />
    <input type="hidden" name="utm_content" />
    
    <button type="submit">Submit</button>
  </form>
