# Netlify Configuration File

[build]
  # Publish directory (root folder)
  publish = "."
  
  # No build command needed for static site
  command = ""

# Form detection settings
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = false
  minify = false

[build.processing.js]
  bundle = false
  minify = false

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# Headers for better performance and security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache static assets
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirect rules
[[redirects]]
  from = "/thank-you"
  to = "/thank-you.html"
  status = 200

# 404 redirect to home
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

# Form submission success redirect
[[redirects]]
  from = "/success"
  to = "/thank-you.html"
  status = 200

# Ensure forms.html is accessible for Netlify detection
# but not indexed by search engines (handled in robots.txt)
