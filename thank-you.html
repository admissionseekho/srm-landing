  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {

      min-height: 100vh;

    .card {
      background: white; border-radius: 32px; max-width: 520px; width: 100%;
      padding: 56px 40px; text-align: center;
      box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5);
      position: relative; overflow: hidden;
    }
    .card-bg {

      background-image: radial-gradient(circle at 20% 30%, #2563EB 2px, transparent 2px),
                        radial-gradient(circle at 80% 70%, #0F172A 2px, transparent 2px);
      background-size: 40px 40px;
    }
    .crown { font-size: 48px; display: block; margin-bottom: 6px; animation: wobble 2s ease-in-out infinite; }
    @keyframes wobble { 0%,100%{transform:rotate(-12deg) scale(1.1);} 50%{transform:rotate(12deg) scale(1.3);} }
    .check-wrap {
      width: 110px; height: 110px; border-radius: 50%;
      background: linear-gradient(135deg, #10B981, #059669);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      box-shadow: 0 12px 30px rgba(16,185,129,0.4);
    }
    .check-wrap svg { width: 52px; height: 52px; color: white; }
    h1 {

      margin-bottom: 14px; line-height: 1.15; letter-spacing: -0.5px;
    }
    p { font-size: 16px; color: #64748B; line-height: 1.65; margin-bottom: 32px; font-weight: 500; }
    p strong { color: #0F172A; }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px; border-radius: 50px; font-weight: 700; font-size: 15px;
      text-decoration: none; transition: transform .18s, box-shadow .18s;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-call {
      background: #0F172A; color: white;
      box-shadow: 0 6px 20px rgba(15,23,42,0.3);
    }
    .btn-wa {
      background: #25D366; color: white;
      box-shadow: 0 6px 20px rgba(37,211,102,0.4);

    .back-link {
      display: block; margin-top: 22px; font-size: 13px; color: #94A3B8;
      text-decoration: none;
    }
    .back-link:hover { color: #475569; }
    .timer-bar { height: 5px; background: #F1F5F9; border-radius: 20px; overflow: hidden; margin-top: 28px; }
    .timer-fill { height: 100%; background: linear-gradient(90deg, #2563EB, #F59E0B); width: 100%; animation: drain 8s linear forwards; }
    @keyframes drain { to { width: 0%; } }
    @media (max-width: 480px) {
      .card { padding: 40px 24px; }
      h1 { font-size: 28px; }
      .actions { flex-direction: column; }
      .btn { width: 100%; justify-content: center; }
    }

  <script>
    /* Confetti on load */
    window.addEventListener('load', function() {
      var duration = 4000, end = Date.now() + duration;
      var defaults = { startVelocity: 28, spread: 360, ticks: 60, zIndex: 0 };
      function rnd(a, b) { return Math.random() * (b - a) + a; }
      var iv = setInterval(function() {
        var left = end - Date.now();
        if (left <= 0) return clearInterval(iv);
        var n = 40 * (left / duration);
        confetti(Object.assign({}, defaults, { particleCount: n, origin: { x: rnd(0.1, 0.3), y: Math.random() - 0.2 } }));
        confetti(Object.assign({}, defaults, { particleCount: n, origin: { x: rnd(0.7, 0.9), y: Math.random() - 0.2 } }));
      }, 250);

      /* Redirect back home after 8s */
      setTimeout(function() { window.location.href = '/'; }, 8000);
    });
